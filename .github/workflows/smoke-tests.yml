name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      nextjs: ${{ steps.filter.outputs.nextjs }}
      nodejs: ${{ steps.filter.outputs.nodejs }}
      react: ${{ steps.filter.outputs.react }}
      svelte: ${{ steps.filter.outputs.svelte }}
      vue: ${{ steps.filter.outputs.vue }}
      go: ${{ steps.filter.outputs.go }}
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      ruby: ${{ steps.filter.outputs.ruby }}
      php: ${{ steps.filter.outputs.php }}
      flutter: ${{ steps.filter.outputs.flutter }}
      dotnet: ${{ steps.filter.outputs.dotnet }}
      java: ${{ steps.filter.outputs.java }}
      swift: ${{ steps.filter.outputs.swift }}
      android: ${{ steps.filter.outputs.android }}
      react-native: ${{ steps.filter.outputs.react-native }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - 'JavaScript/**'
            nextjs:
              - 'Next.js/**'
            nodejs:
              - 'Node.js/**'
            react:
              - 'React/**'
            svelte:
              - 'Svelte/**'
            vue:
              - 'Vue/**'
            go:
              - 'Go/**'
            rust:
              - 'Rust/**'
            python:
              - 'Python/**'
            ruby:
              - 'Ruby/**'
            php:
              - 'PHP/**'
            flutter:
              - 'Flutter/**'
            dotnet:
              - '.NET/**'
            java:
              - 'Java/**'
            swift:
              - 'Swift/**'
            android:
              - 'Android/**'
            react-native:
              - 'ReactNative/**'
            workflow:
              - '.github/workflows/smoke-tests.yml'

  javascript:
    needs: changes
    if: needs.changes.outputs.javascript == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: JavaScript
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: JavaScript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  nextjs:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Next.js
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: Next.js/pnpm-lock.yaml
      - run: cp .env.example .env
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build

  nodejs:
    needs: changes
    if: needs.changes.outputs.nodejs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Node.js
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: Node.js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: node --check index.js
      - run: pnpm run lint
      - run: pnpm test

  react:
    needs: changes
    if: needs.changes.outputs.react == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: React
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: React/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  svelte:
    needs: changes
    if: needs.changes.outputs.svelte == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Svelte
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: Svelte/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  vue:
    needs: changes
    if: needs.changes.outputs.vue == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Vue
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: Vue/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test
      - run: pnpm run build

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: Go/go.mod
      - run: go mod tidy
      - run: go build ./...

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rust
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo build

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: Python/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py
      - run: pytest test_main.py

  ruby:
    needs: changes
    if: needs.changes.outputs.ruby == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Ruby
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
          working-directory: Ruby
      - run: ruby -c example.rb
      - run: bundle exec ruby -e "require 'unleash'"
      - run: bundle exec ruby test_example.rb

  php:
    needs: changes
    if: needs.changes.outputs.php == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PHP
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
      - run: composer install --no-interaction
      - run: php -l index.php
      - run: cp .env.example .env
      - run: |
          php index.php | grep -qE "example-flag is (enabled|disabled)"
      - run: docker compose up -d
      - run: |
          until curl -s --max-time 5 http://localhost:8080 | grep -qE "example-flag is (enabled|disabled)"; do
            sleep 2
          done
        timeout-minutes: 2
      - run: docker compose down

  flutter:
    needs: changes
    if: needs.changes.outputs.flutter == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Flutter/unleash_example
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build web

  dotnet:
    needs: changes
    if: needs.changes.outputs.dotnet == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .NET
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: .NET/dotnet-test.csproj
      - run: dotnet build
      - run: cp .env.example .env
      - run: docker compose run --rm app | grep -qE "'example-flag' is (enabled|disabled)"

  java:
    needs: changes
    if: needs.changes.outputs.java == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Java
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: mvn compile --no-transfer-progress
      - run: docker compose run --rm app | grep -q "Feature enabled:"

  swift:
    needs: changes
    if: needs.changes.outputs.swift == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Swift
    steps:
      - uses: actions/checkout@v6
      - uses: swift-actions/setup-swift@v3
      - run: swift build
      - run: cp .env.example .env
      - run: swift run 2>&1 | grep -qE "example-flag is (enabled|disabled)"

  android:
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug

  react-native:
    needs: changes
    if: needs.changes.outputs.react-native == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ReactNative
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'
          cache-dependency-path: ReactNative/pnpm-lock.yaml
      - run: cp .env.example .env
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
